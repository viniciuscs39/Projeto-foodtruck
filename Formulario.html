<<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Formulário de Pedido - Foodtruck</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background-color: #ffffff;
      margin: 20px;
      color: #000000;
    }
    form {
      width: 600px;
      margin: auto;
      padding: 20px;
      border: 2px solid #444;
      border-radius: 8px;
      background-color: #f9f9f9;
    }
    h1 {
      text-align: center;
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-top: 10px;
      font-weight: bold;
    }
    select, input[type="text"], input[type="number"] {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      margin-bottom: 15px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    input[type="submit"] {
      background-color: #2c3e50;
      color: #fff;
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    input[type="submit"]:hover {
      background-color: #34495e;
    }
  </style>
</head>
<body>

  <form action="#" method="post">
    <h1>Formulário de Pedido - Foodtruck</h1>

    <label for="hamburguer">Hambúrgueres</label>
    <select id="hamburguer" name="hamburguer">
      <option value="">Selecione...</option>
      <option>Clássico da Casa - R$25,00</option>
      <option>Barbecue Bacon - R$28,00</option>
      <option>Veggie Grill - R$26,00</option>
      <option>Cheddar Melt - R$27,00</option>
      <option>Picante Mexicano - R$29,00</option>
    </select>

    <label for="acompanhamento">Acompanhamentos</label>
    <select id="acompanhamento" name="acompanhamento">
      <option value="">Selecione...</option>
      <option>Batata frita - R$12,00</option>
      <option>Onion Rings - R$14,00</option>
      <option>Nachos com cheddar - R$15,00</option>
    </select>

    <label for="bebida_na">Bebidas não alcoólicas</label>
    <select id="bebida_na" name="bebida_na">
      <option value="">Selecione...</option>
      <option>Refrigerante - R$6,00</option>
      <option>Água Mineral - R$4,00</option>
      <option>Suco Natural - R$8,00</option>
    </select>

    <label for="bebida_a">Bebidas alcoólicas</label>
    <select id="bebida_a" name="bebida_a">
      <option value="">Selecione...</option>
      <option>Cerveja - R$10,00</option>
      <option>Drinques - R$10,00</option>
    </select>

    <label for="bebida_q">Bebidas Quentes</label>
    <select id="bebida_q" name="bebida_q">
      <option value="">Selecione...</option>
      <option>Cappuccino - R$7,00</option>
      <option>Café Expresso - R$5,00</option>
      <option>Café Coado - R$4,00</option>
      <option>Chá Quente - R$6,00</option>
      <option>Chocolate Quente - R$7,00</option>
    </select>

    <label for="bebida_f">Bebidas Frias</label>
    <select id="bebida_f" name="bebida_f">
      <option value="">Selecione...</option>
      <option>Chá Gelado - R$6,00</option>
      <option>Iced Latte - R$8,00</option>
      <option>Soda Italiana - R$9,00</option>
    </select>

    <label for="sobremesa">Sobremesas</label>
    <select id="sobremesa" name="sobremesa">
      <option value="">Selecione...</option>
      <option>Brownie - R$9,00</option>
      <option>Cocada - R$5,00</option>
    </select>

    <label for="nome">Nome do Cliente</label>
    <input type="text" id="nome" name="nome" placeholder="Digite seu nome">

    <label for="quantidade">Quantidade</label>
    <input type="number" id="quantidade" name="quantidade" min="1" value="1">

    <input type="submit" value="Enviar Pedido">
  </form>

</body>
</html>
